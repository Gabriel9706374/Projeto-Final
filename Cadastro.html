<html>
    <head>
        <meta charset="UTF-8">
        <title> Cadastro</title>
        <link rel="stylesheet" href="Cadastro.css">
    </head>
    <body>
        <h1 id="titulo-form"> Cadastro de Torcedor</h1>
    <form>
        <label> Nome:</label>
        <input type="text" id="nome" required>
        <div class="Data_de_Nacimento">
        <label for="Data_de_Nacimento"> Data de Nacimento:</label>
        <input type="date" id="data" name="Data_de_Nacimento" required>
        </div>
        <div class="E-Mail">
        <label for="E-Mail"> E-Mail:</label>
        <input type="email" id="email" name="E-Mail" required>
        </div>
        <label> Senha:</label>
        <input type="password" id="senha" required>
        <br>
        <label> País:</label>
        <select id="pais" required>
            <option value="">Selecione um país</option>
            <option value="Brasil">Brasil</option>
            <option value="Argentina">Argentina</option>
            <option value="Uruguai">Uruguai</option>
            <option value="Paraguai">Paraguai</option>
            <option value="Chile">Chile</option>
            <option value="Bolívia">Bolívia</option>
            <option value="Peru">Peru</option>
            <option value="Colômbia">Colômbia</option>
            <option value="Venezuela">Venezuela</option>
            <option value="Equador">Equador</option>
            <option value="México">México</option>
            <option value="Estados Unidos">Estados Unidos</option>
            <option value="Canadá">Canadá</option>
            <option value="Portugal">Portugal</option>
            <option value="Espanha">Espanha</option>
            <option value="França">França</option>
            <option value="Alemanha">Alemanha</option>
            <option value="Itália">Itália</option>
            <option value="Reino Unido">Reino Unido</option>
            <option value="Japão">Japão</option>
        </select>
        <br>
        <label> Jogador Favorito:</label>
        <input type="text" id="jogador_favorito" required>
        <br>
        <button type="submit" id="btnEnviar"> Enviar</button>
    </form>
    <script src="Cadastro.js"></script>
    </body>
    <footer>
    </footer>
</html>
